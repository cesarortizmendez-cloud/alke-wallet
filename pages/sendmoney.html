<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Enviar dinero | Alke Wallet</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body class="bg-soft" data-page="sendmoney">

  <nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold" href="menu.html">Alke Wallet</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div id="nav" class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto gap-2">
          <li class="nav-item"><a class="nav-link" href="menu.html">Menú</a></li>
          <li class="nav-item"><a class="nav-link" href="deposit.html">Depósitos</a></li>
          <li class="nav-item"><a class="nav-link" href="transactions.html">Movimientos</a></li>
          <li class="nav-item"><button class="btn btn-outline-danger btn-sm" onclick="logout()">Salir</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4" style="max-width: 860px;">
    <div class="row g-3">

      <div class="col-12 col-lg-5">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <h1 class="h5 mb-3">Enviar dinero</h1>

            <div class="mb-3">
              <div class="text-secondary">Saldo actual</div>
              <div id="balanceValue" class="h4 money">$0</div>
            </div>

            <!-- Buscar contacto + autocompletar -->
            <label class="form-label">Buscar contacto</label>
            <input id="contactSearch" class="form-control" type="text" placeholder="Escribe nombre o cuenta...">
            <div id="suggestions" class="list-group mt-2"></div>

            <input id="contactSelected" type="hidden">

            <div class="d-flex gap-2 mt-3">
              <button class="btn btn-outline-primary w-100" data-bs-toggle="modal" data-bs-target="#newContactModal">
                + Agregar contacto
              </button>
            </div>

            <hr class="my-4">

            <!-- Form transferencia (validación básica) -->
            <form id="sendForm" novalidate>
              <div class="mb-3">
                <label class="form-label">Monto a transferir</label>
                <input id="amount" class="form-control" type="number" min="1" required placeholder="Ej: 10000">
              </div>

              <button class="btn btn-primary w-100" type="submit">Enviar</button>
              <p class="small-help mt-2 mb-0">La transferencia es simulada y queda registrada en movimientos.</p>
            </form>

          </div>
        </div>
      </div>

      <div class="col-12 col-lg-7">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <h2 class="h6 text-secondary mb-2">Tip</h2>
            <p class="mb-0">
              Escribe “Ana”, “Bruno”, “Carla” o una cuenta como “111-222” para ver el autocompletado.
            </p>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Modal agregar contacto -->
  <div class="modal fade" id="newContactModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="newContactForm">
          <div class="modal-header">
            <h5 class="modal-title">Nuevo contacto</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input id="cName" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Alias</label>
              <input id="cAlias" class="form-control" placeholder="Opcional">
            </div>
            <div class="mb-3">
              <label class="form-label">Cuenta</label>
              <input id="cAccount" class="form-control" required placeholder="Ej: 999-888">
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-outline-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
            <button class="btn btn-primary" type="submit">Guardar contacto</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/wallet.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
