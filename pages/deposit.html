<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Depósitos | Alke Wallet</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body class="bg-soft" data-page="deposit">

  <nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold" href="menu.html">Alke Wallet</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div id="nav" class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto gap-2">
          <li class="nav-item"><a class="nav-link" href="menu.html">Menú</a></li>
          <li class="nav-item"><a class="nav-link" href="sendmoney.html">Enviar dinero</a></li>
          <li class="nav-item"><a class="nav-link" href="transactions.html">Movimientos</a></li>
          <li class="nav-item"><button id="btnLogout" class="btn btn-outline-danger btn-sm" onclick="logout()">Salir</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4" style="max-width: 760px;">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Depósitos y Retiros</h1>

        <div class="mb-3">
          <div class="text-secondary">Saldo actual</div>
          <div id="balanceValue" class="h3 money mb-0">$0</div>
        </div>

        <form id="depositForm" class="row g-3">
          <div class="col-12">
            <label class="form-label">Monto</label>
            <input id="amount" class="form-control" type="number" min="1" required placeholder="Ej: 5000">
            <div class="form-text">Ingresa el monto en CLP.</div>
          </div>

          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="action" id="rDeposit" value="deposit" checked>
              <label class="form-check-label" for="rDeposit">Depósito</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="action" id="rWithdraw" value="withdraw">
              <label class="form-check-label" for="rWithdraw">Retiro</label>
            </div>
          </div>

          <div class="col-12">
            <button class="btn btn-primary w-100" type="submit">Realizar operación</button>
          </div>
        </form>

      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/wallet.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
