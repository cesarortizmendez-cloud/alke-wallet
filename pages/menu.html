<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menú | Alke Wallet</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body class="bg-soft" data-page="menu">

  <!-- Página: Menú principal. El atributo `data-page="menu"` permite a los scripts
    detectar y ejecutar solo la lógica necesaria para esta vista. -->

  <!-- Barra de navegación: enlaces a las secciones principales y botón de salir.
    La estructura usa clases de Bootstrap para responsividad. -->
  <nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold" href="menu.html">Alke Wallet</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div id="nav" class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto gap-2">
          <li class="nav-item"><a class="nav-link" href="deposit.html">Depósitos</a></li>
          <li class="nav-item"><a class="nav-link" href="sendmoney.html">Enviar dinero</a></li>
          <li class="nav-item"><a class="nav-link" href="transactions.html">Movimientos</a></li>
          <li class="nav-item"><button id="btnLogout" class="btn btn-outline-danger btn-sm">Salir</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-3">
      <div class="col-12 col-lg-6">
        <div class="card card-hover border-0">
          <div class="card-body">
              <h2 class="h6 text-secondary mb-1">Saldo disponible</h2>
              <!-- `#balanceValue` se llena dinámicamente desde `wallet.js` usando los datos
                del usuario (saldo actual). Mantener el id para la actualización por JS. -->
              <div id="balanceValue" class="h2 money mb-0">$0</div>
            
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-6">
        <div class="card card-hover border-0">
          <div class="card-body">
            <h2 class="h6 text-secondary mb-3">Acceso directo</h2>
            <!-- Accesos rápidos hacia las páginas de depósito, envío y movimientos. -->
            <div class="d-grid gap-2">
              <a class="btn btn-primary" href="deposit.html">Ir a Depósitos / Retiros</a>
              <a class="btn btn-outline-primary" href="sendmoney.html">Enviar dinero</a>
              <a class="btn btn-outline-secondary" href="transactions.html">Ver últimos movimientos</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Orden de scripts: primero utilidades/datos, luego manejo de UI, auth y lógica de wallet.
      - data.js: carga/gestiona datos locales (ej. usuarios, transacciones simuladas)
      - ui.js: helpers para renderizar elementos y formatear valores
      - auth.js: controla sesión, login/logout y redirecciones
      - wallet.js: lógica de saldo, depósitos y envíos (actualiza `#balanceValue`)
      - app.js: inicialización general que enlaza todo lo anterior en la vista -->
    <script src="../assets/js/data.js"></script>
    <script src="../assets/js/ui.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/wallet.js"></script>
    <script src="../assets/js/app.js"></script>
</body>
</html>
