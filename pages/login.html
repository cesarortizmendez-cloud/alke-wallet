<!doctype html> <!-- Declara HTML5 -->
<html lang="es"> <!-- Idioma español -->
<head> <!-- Metadatos y recursos -->
  <meta charset="utf-8" /> <!-- UTF-8 -->
  <meta name="viewport" content="width=device-width, initial-scale=1" /> <!-- Responsive -->
  <title>Login | Alke Wallet</title> <!-- Título página -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- Bootstrap CSS CDN -->
  <link rel="stylesheet" href="../assets/css/styles.css"> <!-- Estilos locales -->
</head> <!-- Fin head -->

<body class="bg-soft" data-page="login"> <!-- Body con clase y data-page para inicialización -->
  <!-- Página: Login. `data-page="login"` permite a `app.js` ejecutar la inicialización específica de esta vista -->
  <main class="container py-5"> <!-- Contenedor principal con padding vertical -->
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 520px;"> <!-- Card centrada con ancho máximo -->
      <div class="card-body p-4"> <!-- Padding interior de la card -->
        <h1 class="h4 mb-1">Iniciar sesión</h1> <!-- Título principal -->
        <!-- Información de credenciales demo visible en la UI para pruebas -->
        <p class="small-help mb-4"> <!-- Texto de ayuda pequeño -->
          Clave demo: <b>demo@alkewallet.com</b> / <b>Alke1234</b> <!-- Credenciales ejemplo -->
        </p>

        <!-- Formulario de login: `#loginForm` usado por `auth.js`; `novalidate` para validación JS -->
        <form id="loginForm" novalidate> <!-- Form con id para captura por JS -->
          <div class="mb-3"> <!-- Grupo email -->
            <label class="form-label">Email</label> <!-- Label email -->
            <!-- Input de email: `type="email"` valida formato básico -->
            <input id="email" class="form-control" type="email" required placeholder="demo@alkewallet.com"> <!-- Campo email -->
          </div>

          <div class="mb-3"> <!-- Grupo contraseña -->
            <label class="form-label">Contraseña</label> <!-- Label contraseña -->
            <!-- Input de contraseña: `minlength` ejemplo de restricción -->
            <input id="password" class="form-control" type="password" required minlength="4" placeholder="Alke1234"> <!-- Campo password -->
          </div>

          <!-- Al hacer submit, `auth.js` valida credenciales y redirige al menú si es correcto -->
          <button class="btn btn-primary w-100" type="submit">Entrar</button> <!-- Botón submit -->
        </form> <!-- Fin formulario -->

        <br> <!-- Espacio -->
      </div> <!-- Fin card-body -->
    </div> <!-- Fin card -->
  </main> <!-- Fin main -->

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script> <!-- jQuery CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> <!-- Bootstrap JS -->

    <!-- Scripts: data, UI, auth, wallet y app. `auth.js` usa `#loginForm` -->
    <script src="../assets/js/data.js"></script> <!-- Datos/localStorage -->
    <script src="../assets/js/ui.js"></script> <!-- Helpers UI -->
    <script src="../assets/js/auth.js"></script> <!-- Lógica de autenticación -->
    <script src="../assets/js/wallet.js"></script> <!-- Lógica wallet (opcional en login) -->
    <script src="../assets/js/app.js"></script> <!-- Inicializador general -->
</body> <!-- Fin body -->
</html> <!-- Fin documento -->
