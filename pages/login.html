<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | Alke Wallet</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body class="bg-soft" data-page="login">
  <main class="container py-5">
    <div class="brand-badge mb-3">💳 Alke Wallet</div>

    <div class="card shadow-sm border-0 mx-auto" style="max-width: 520px;">
      <div class="card-body p-4">
        <h1 class="h4 mb-1">Iniciar sesión</h1>
        <p class="small-help mb-4">
          Demo: <b>demo@alkewallet.com</b> / <b>Alke1234</b>
        </p>

        <!-- Validaciones básicas (HTML5) -->
        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input id="email" class="form-control" type="email" required placeholder="demo@alkewallet.com">
          </div>

          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input id="password" class="form-control" type="password" required minlength="4" placeholder="Alke1234">
          </div>

          <button class="btn btn-primary w-100" type="submit">Entrar</button>
        </form>

        <hr class="my-4">
        <a href="../index.html" class="text-decoration-none">← Volver</a>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/wallet.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
